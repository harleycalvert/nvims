{{define "admin-faculties"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVIMS — Faculties</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/people.css">
  <link rel="stylesheet" href="/static/sessions.css">
  <link rel="stylesheet" href="/static/sidebar.css">
  <script>document.documentElement.dataset.sidebar=localStorage.getItem("nvims-sidebar")||"open";</script>
</head>
<body>
  {{template "sidebar" .}}
  <div class="page-wrap">
  <header>
    <div class="header-top">
      <div class="header-title-group">
        <a class="header-home" href="/admin">Administration</a>
        <h1>Faculties</h1>
      </div>
      <form method="POST" action="/logout"><button class="btn-signout">Sign Out</button></form>
    </div>
    <div class="header-sub">
      <span class="header-fullname">{{.User.FullName}}</span>
      <span class="header-role">{{.User.Role}}</span>
    </div>
  </header>

  <main class="sessions-main">

    <div class="sess-toolbar">
      <a class="btn-secondary" href="/admin/programs">← Programs</a>
    </div>

    <div class="table-wrap">
      <table class="sessions-table" id="faculties-table">
        <thead>
          <tr>
            <th class="td-left">Faculty Name</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="faculties-tbody">
          {{range .Faculties}}
          <tr class="sess-row" data-id="{{.ID}}">
            <td><input class="sess-input" type="text" name="faculty_name"
                       value="{{.Name}}" maxlength="100" style="width:100%;min-width:240px"></td>
            <td class="sess-actions">
              <span class="sess-status"></span>
              <button class="btn-danger-sm fac-delete" type="button" title="Delete">✕</button>
            </td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>

    <div class="sess-add-bar">
      <button class="btn-primary btn-sm" id="btn-add-faculty" type="button">+ Add Faculty</button>
    </div>

  </main>

<script>
(function () {
  function setStatus(tr, state) {
    const el = tr.querySelector('.sess-status');
    el.className = 'sess-status sess-status-' + state;
    el.textContent = state === 'saving' ? '…' : state === 'saved' ? '✓' : state === 'error' ? '!' : '';
    if (state === 'saved') setTimeout(() => { el.textContent = ''; el.className = 'sess-status'; }, 1500);
  }

  async function saveRow(tr) {
    const id   = tr.dataset.id;
    const name = tr.querySelector('[name=faculty_name]').value.trim();
    if (!name) return;

    setStatus(tr, 'saving');
    const url  = id === 'new' ? '/admin/faculties/new' : `/admin/faculties/${id}`;
    const body = new URLSearchParams({ faculty_name: name });
    try {
      const res = await fetch(url, { method: 'POST', body });
      if (!res.ok) { setStatus(tr, 'error'); return; }
      if (id === 'new') { location.reload(); return; }
      setStatus(tr, 'saved');
    } catch { setStatus(tr, 'error'); }
  }

  async function deleteRow(tr) {
    const id = tr.dataset.id;
    if (id === 'new') { tr.remove(); return; }
    if (!confirm('Delete this faculty?')) return;
    setStatus(tr, 'saving');
    try {
      const res = await fetch(`/admin/faculties/${id}/delete`, { method: 'POST' });
      if (!res.ok) { setStatus(tr, 'error'); return; }
      tr.remove();
    } catch { setStatus(tr, 'error'); }
  }

  function attachRowListeners(tr) {
    tr.querySelector('[name=faculty_name]')?.addEventListener('blur', () => saveRow(tr));
    tr.querySelector('.fac-delete')?.addEventListener('click', () => deleteRow(tr));
  }

  document.querySelectorAll('#faculties-tbody .sess-row').forEach(attachRowListeners);

  document.getElementById('btn-add-faculty')?.addEventListener('click', () => {
    const tbody = document.getElementById('faculties-tbody');
    tbody.querySelector('.sess-new')?.remove();

    const tr = document.createElement('tr');
    tr.className = 'sess-row sess-new';
    tr.dataset.id = 'new';
    tr.innerHTML = `
      <td><input class="sess-input" type="text" name="faculty_name"
                 placeholder="Faculty name" maxlength="100"
                 style="width:100%;min-width:240px"></td>
      <td class="sess-actions">
        <span class="sess-status"></span>
        <button class="btn-danger-sm fac-delete" type="button" title="Remove">✕</button>
      </td>`;
    tbody.appendChild(tr);
    attachRowListeners(tr);
    tr.querySelector('[name=faculty_name]').focus();
  });
})();
</script>
  </div>
</body>
</html>{{end}}
