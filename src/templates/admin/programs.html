{{define "admin-programs"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVIMS — Programs</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/people.css">
  <link rel="stylesheet" href="/static/sessions.css">
  <link rel="stylesheet" href="/static/sidebar.css">
  <script>document.documentElement.dataset.sidebar=localStorage.getItem("nvims-sidebar")||"open";</script>
</head>
<body>
  {{template "sidebar" .}}
  <div class="page-wrap">
  <header>
    <div class="header-top">
      <div class="header-title-group">
        <a class="header-home" href="/admin">Administration</a>
        <h1>Programs</h1>
      </div>
      <form method="POST" action="/logout"><button class="btn-signout">Sign Out</button></form>
    </div>
    <div class="header-sub">
      <span class="header-fullname">{{.User.FullName}}</span>
      <span class="header-role">{{.User.Role}}</span>
    </div>
  </header>

  <main class="sessions-main">

    {{template "admin-nav" .}}

    <div class="table-wrap">
      <table class="sessions-table" id="programs-table">
        <thead>
          <tr>
            <th>Code</th>
            <th class="td-left">Name</th>
            <th>Faculty</th>
            <th>Type</th>
            <th title="AVETMISS Recognition ID">Recog</th>
            <th title="AVETMISS Level of Education">Level</th>
            <th title="ASCED Field of Education">Field</th>
            <th title="Nominal hours">Hours</th>
            <th title="AQF Level">AQF</th>
            <th title="VET flag">VET</th>
            <th title="Higher Education flag">HE</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="programs-tbody">
          {{range .Programs}}
          <tr class="sess-row" data-id="{{.ID}}">
            <td><input class="sess-input pp-code" type="text" name="program_code"
                       value="{{.ProgramCode}}" maxlength="10"></td>
            <td><input class="sess-input pp-name" type="text" name="program_name"
                       value="{{.ProgramName}}" maxlength="100"></td>
            <td>
              <select class="sess-input pp-fac" name="faculty_id">
                {{$fid := .FacultyID}}
                {{range $.Faculties}}
                <option value="{{.ID}}"{{if eq .ID $fid}} selected{{end}}>{{.Name}}</option>
                {{end}}
              </select>
            </td>
            <td>
              <select class="sess-input pp-type" name="program_type">
                <option value="">— none —</option>
                {{$pt := .ProgramType}}
                {{range $.ProgramTypes}}
                <option value="{{.}}"{{if eq . $pt}} selected{{end}}>{{.}}</option>
                {{end}}
              </select>
            </td>
            <td><input class="sess-input pp-recog" type="text" name="program_recognition_id"
                       value="{{.ProgramRecognitionID}}" maxlength="2"></td>
            <td><input class="sess-input pp-level" type="text" name="level_of_education"
                       value="{{.LevelOfEducation}}" maxlength="3"></td>
            <td><input class="sess-input pp-field" type="text" name="field_of_education"
                       value="{{.FieldOfEducation}}" maxlength="4"></td>
            <td><input class="sess-input pp-hours" type="number" name="nominal_hours"
                       value="{{.NominalHours}}" min="0"></td>
            <td><input class="sess-input pp-aqf" type="number" name="aqf_level"
                       value="{{if .AQFLevel}}{{.AQFLevel}}{{end}}" min="1" max="10" placeholder="—"></td>
            <td class="pp-flag"><input type="checkbox" name="vet_flag"{{if .VetFlag}} checked{{end}}></td>
            <td class="pp-flag"><input type="checkbox" name="he_flag"{{if .HeFlag}} checked{{end}}></td>
            <td class="sess-actions">
              <span class="sess-status"></span>
              <button class="btn-danger-sm pp-delete" type="button" title="Delete">✕</button>
            </td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>

    <div class="sess-add-bar">
      <button class="btn-primary btn-sm" id="btn-add-program" type="button">+ Add Program</button>
    </div>

  </main>

<script>
(function () {
  const programTypes = [{{range $i,$t := .ProgramTypes}}{{if $i}},{{end}}"{{$t}}"{{end}}];
  const faculties    = [{{range $i,$f := .Faculties}}{{if $i}},{{end}}{"id":{{$f.ID}},"name":{{printf "%q" $f.Name}}}{{end}}];

  function typeOptions(selected) {
    return '<option value="">— none —</option>' +
      programTypes.map(t =>
        `<option value="${t}"${t === selected ? ' selected' : ''}>${t}</option>`
      ).join('');
  }

  function facultyOptions(selectedID) {
    return faculties.map(f =>
      `<option value="${f.id}"${f.id === selectedID ? ' selected' : ''}>${f.name}</option>`
    ).join('');
  }

  function setStatus(tr, state) {
    const el = tr.querySelector('.sess-status');
    el.className = 'sess-status sess-status-' + state;
    el.textContent = state === 'saving' ? '…' : state === 'saved' ? '✓' : state === 'error' ? '!' : '';
    if (state === 'saved') setTimeout(() => { el.textContent = ''; el.className = 'sess-status'; }, 1500);
  }

  function collectFields(tr) {
    return {
      program_code:          tr.querySelector('[name=program_code]').value.trim(),
      program_name:          tr.querySelector('[name=program_name]').value.trim(),
      faculty_id:            tr.querySelector('[name=faculty_id]').value,
      program_type:          tr.querySelector('[name=program_type]').value,
      program_recognition_id: tr.querySelector('[name=program_recognition_id]').value.trim(),
      level_of_education:    tr.querySelector('[name=level_of_education]').value.trim(),
      field_of_education:    tr.querySelector('[name=field_of_education]').value.trim(),
      nominal_hours:         tr.querySelector('[name=nominal_hours]').value.trim(),
      aqf_level:             tr.querySelector('[name=aqf_level]').value.trim(),
      vet_flag:              tr.querySelector('[name=vet_flag]').checked ? '1' : '0',
      he_flag:               tr.querySelector('[name=he_flag]').checked  ? '1' : '0',
    };
  }

  function isComplete(f) {
    return f.program_code && f.program_name && f.faculty_id &&
           f.program_recognition_id && f.level_of_education &&
           f.field_of_education && f.nominal_hours;
  }

  async function saveRow(tr) {
    const id = tr.dataset.id;
    const f  = collectFields(tr);
    if (!isComplete(f)) return;

    setStatus(tr, 'saving');
    const url  = id === 'new' ? '/admin/programs/new' : `/admin/programs/${id}`;
    const body = new URLSearchParams(f);
    try {
      const res = await fetch(url, { method: 'POST', body });
      if (!res.ok) { setStatus(tr, 'error'); return; }
      if (id === 'new') { location.reload(); return; }
      setStatus(tr, 'saved');
    } catch { setStatus(tr, 'error'); }
  }

  async function deleteRow(tr) {
    const id = tr.dataset.id;
    if (id === 'new') { tr.remove(); return; }
    if (!confirm('Delete this program?')) return;
    setStatus(tr, 'saving');
    try {
      const res = await fetch(`/admin/programs/${id}/delete`, { method: 'POST' });
      if (!res.ok) { setStatus(tr, 'error'); return; }
      tr.remove();
    } catch { setStatus(tr, 'error'); }
  }

  function attachRowListeners(tr) {
    ['program_code','program_name','program_recognition_id',
     'level_of_education','field_of_education','nominal_hours','aqf_level'].forEach(name => {
      tr.querySelector(`[name=${name}]`)?.addEventListener('blur', () => saveRow(tr));
    });
    ['faculty_id','program_type'].forEach(name => {
      tr.querySelector(`[name=${name}]`)?.addEventListener('change', () => saveRow(tr));
    });
    ['vet_flag','he_flag'].forEach(name => {
      tr.querySelector(`[name=${name}]`)?.addEventListener('change', () => saveRow(tr));
    });
    tr.querySelector('.pp-delete')?.addEventListener('click', () => deleteRow(tr));
  }

  document.querySelectorAll('#programs-tbody .sess-row').forEach(attachRowListeners);

  document.getElementById('btn-add-program')?.addEventListener('click', () => {
    const tbody = document.getElementById('programs-tbody');
    tbody.querySelector('.sess-new')?.remove();

    const defaultFacID = faculties.length === 1 ? faculties[0].id : 0;
    const tr = document.createElement('tr');
    tr.className = 'sess-row sess-new';
    tr.dataset.id = 'new';
    tr.innerHTML = `
      <td><input class="sess-input pp-code" type="text" name="program_code"
                 placeholder="e.g. ICT30120" maxlength="10"></td>
      <td><input class="sess-input pp-name" type="text" name="program_name"
                 placeholder="Program name" maxlength="100"></td>
      <td><select class="sess-input pp-fac" name="faculty_id">${facultyOptions(defaultFacID)}</select></td>
      <td><select class="sess-input pp-type" name="program_type">${typeOptions('')}</select></td>
      <td><input class="sess-input pp-recog" type="text" name="program_recognition_id"
                 placeholder="11" maxlength="2"></td>
      <td><input class="sess-input pp-level" type="text" name="level_of_education"
                 placeholder="514" maxlength="3"></td>
      <td><input class="sess-input pp-field" type="text" name="field_of_education"
                 placeholder="0200" maxlength="4"></td>
      <td><input class="sess-input pp-hours" type="number" name="nominal_hours"
                 placeholder="0" min="0"></td>
      <td><input class="sess-input pp-aqf" type="number" name="aqf_level"
                 placeholder="—" min="1" max="10"></td>
      <td class="pp-flag"><input type="checkbox" name="vet_flag" checked></td>
      <td class="pp-flag"><input type="checkbox" name="he_flag"></td>
      <td class="sess-actions">
        <span class="sess-status"></span>
        <button class="btn-danger-sm pp-delete" type="button" title="Remove">✕</button>
      </td>`;
    tbody.appendChild(tr);
    attachRowListeners(tr);
    tr.querySelector('[name=program_code]').focus();
  });
})();
</script>
  </div>
</body>
</html>{{end}}
