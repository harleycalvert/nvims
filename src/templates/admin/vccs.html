{{define "admin-vccs"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVIMS-SMS — VCC Records</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/people.css">
  <link rel="stylesheet" href="/static/sessions.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-title-group">
        <a class="header-home" href="/admin">Administration</a>
        <h1>VCC Records</h1>
      </div>
      <form method="POST" action="/logout"><button class="btn-signout">Sign Out</button></form>
    </div>
    <div class="header-sub">
      <span class="header-fullname">{{.User.FullName}}</span>
      <span class="header-role">{{.User.Role}}</span>
    </div>
  </header>

  <main class="sessions-main">
    <div class="table-wrap">
      <table class="sessions-table">
        <thead>
          <tr>
            <th class="td-left">Teacher</th>
            <th>Year</th>
            <th class="td-left">Version</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {{range .VCCs}}
          <tr>
            <td class="td-left">{{.TeacherName}}</td>
            <td>{{.CalendarYear}}</td>
            <td class="td-left">{{.VersionLabel}}</td>
            <td><span class="status-badge status-{{.Status | statusCSS}}">{{.Status}}</span></td>
            <td><a class="btn-secondary" href="/admin/vccs/{{.ID}}">View / Edit</a></td>
          </tr>
          {{else}}
          <tr><td colspan="5" class="hint" style="padding:16px">No VCC records found.</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>{{end}}
