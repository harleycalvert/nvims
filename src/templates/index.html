{{define "index"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVIMS-SMS — Class View</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/register.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-title-group">
        <a class="header-home" href="/">NVIMS-SMS</a>
        <h1>Attendance Register</h1>
      </div>
      <form method="POST" action="/logout">
        <button class="btn-signout">Sign Out</button>
      </form>
    </div>
    <div class="header-sub">
      <span class="header-fullname">{{.User.FullName}}</span>
      <span class="header-role">{{.User.Role}}</span>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="control-group">
        <label for="period-select">Academic Period</label>
        <select id="period-select"
          name="period_id"
          hx-get="/programs"
          hx-trigger="change"
          hx-target="#programs-panel"
          hx-include="this">
          <option value="">— select period —</option>
          {{range .Periods}}
          <option value="{{.ID}}">{{.Year}} — {{.PeriodName}} ({{.PeriodCode}})</option>
          {{end}}
        </select>
      </div>

      <div id="programs-panel" class="control-group">
        <p class="hint">Select a period first.</p>
      </div>

      <div id="groups-panel" class="control-group">
        <p class="hint">Select a program first.</p>
      </div>

      <div id="classes-panel">
        <p class="hint">Select a group to see its classes.</p>
      </div>

      <div class="view-toggle">
        <label class="view-toggle-label">
          <input type="radio" name="view_mode" value="attendance" checked
            hx-get="/attendance"
            hx-target="#view-panel"
            hx-include="[name='class_id']:checked"
            hx-trigger="change">
          Attendance
        </label>
        <label class="view-toggle-label">
          <input type="radio" name="view_mode" value="results"
            hx-get="/results"
            hx-target="#view-panel"
            hx-include="[name='class_id']:checked"
            hx-trigger="change"
            onclick="document.querySelectorAll('[name=class_id]').forEach(cb => cb.checked = true)">
          Results
        </label>
      </div>
    </section>

    <div id="view-panel">
      <p class="hint">Check one or more classes above to view attendance.</p>
    </div>
  </main>
</body>
</html>{{end}}
