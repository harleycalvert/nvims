{{define "index"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVIMS-SMS — Attendance</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>Attendance Register</h1>
  </header>

  <main>
    <section class="controls">
      <div class="control-group">
        <label for="period-select">Academic Period</label>
        <select id="period-select"
          hx-get="/classes"
          hx-trigger="change"
          hx-target="#classes-panel"
          hx-include="this"
          name="period_id">
          <option value="">— select period —</option>
          {{range .Periods}}
          <option value="{{.ID}}">{{.Year}} — {{.PeriodName}} ({{.PeriodCode}})</option>
          {{end}}
        </select>
      </div>

      <div id="classes-panel" class="class-list">
        <p class="hint">Select a period to see its classes.</p>
      </div>
    </section>

    <section id="attendance-panel">
      <p class="hint">Check one or more classes above to view attendance.</p>
    </section>
  </main>
</body>
</html>{{end}}
