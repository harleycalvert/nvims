{{define "admin-nav"}}
<div class="admin-nav">
  <a class="admin-nav-tile" href="/admin/people" data-nav="/admin/people">
    <span class="admin-nav-bar admin-nav-bar-people"></span>
    <span class="admin-nav-label">People</span>
  </a>
  <a class="admin-nav-tile" href="/admin/periods" data-nav="/admin/periods">
    <span class="admin-nav-bar admin-nav-bar-periods"></span>
    <span class="admin-nav-label">Periods</span>
  </a>
  <a class="admin-nav-tile" href="/admin/programs" data-nav="/admin/programs">
    <span class="admin-nav-bar admin-nav-bar-programs"></span>
    <span class="admin-nav-label">Programs &amp; Delivery</span>
  </a>
  <a class="admin-nav-tile" href="/admin/subjects" data-nav="/admin/subjects">
    <span class="admin-nav-bar admin-nav-bar-subjects"></span>
    <span class="admin-nav-label">Subjects</span>
  </a>
  <a class="admin-nav-tile" href="/admin/intake-groups" data-nav="/admin/intake-groups">
    <span class="admin-nav-bar admin-nav-bar-intake"></span>
    <span class="admin-nav-label">Intake Groups</span>
  </a>
  <a class="admin-nav-tile" href="/admin/enrollments" data-nav="/admin/enrollments">
    <span class="admin-nav-bar admin-nav-bar-enrolments"></span>
    <span class="admin-nav-label">Enrolments</span>
  </a>
  <a class="admin-nav-tile" href="/admin/classes" data-nav="/admin/classes">
    <span class="admin-nav-bar admin-nav-bar-classes"></span>
    <span class="admin-nav-label">Classes</span>
  </a>
  <a class="admin-nav-tile" href="/admin/sessions" data-nav="/admin/sessions">
    <span class="admin-nav-bar admin-nav-bar-sessions"></span>
    <span class="admin-nav-label">Sessions</span>
  </a>
</div>
<script>
(function(){
  const p = location.pathname;
  document.querySelectorAll('.admin-nav-tile[data-nav]').forEach(function(a){
    if (p === a.dataset.nav || p.startsWith(a.dataset.nav + '/')) a.classList.add('active');
  });
})();
</script>
{{end}}
