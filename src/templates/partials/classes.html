{{define "classes"}}
{{if not .Classes}}
  <p class="hint">No classes found for this group.</p>
{{else}}
  <div class="classes-inline">
    <span class="classes-label">Classes</span>
    {{range .Classes}}
    <label class="class-label">
      <input type="checkbox"
        name="class_id"
        value="{{.ID}}"
        hx-get="/attendance"
        hx-trigger="change"
        hx-target="#view-panel"
        hx-include="[name='class_id']:checked">
      {{.SubjectName}}
    </label>
    {{end}}
  </div>
{{end}}
<div id="view-panel" hx-swap-oob="true">
  <p class="hint">Check one or more classes above to view attendance.</p>
</div>
{{end}}
