{{define "config-nav"}}
<div class="admin-nav">
  <a class="admin-nav-tile" href="/admin/infrastructure/orgs" data-nav="/admin/infrastructure/orgs">
    <span class="admin-nav-bar config-nav-bar-orgs"></span>
    <span class="admin-nav-label">Training Organisations</span>
  </a>
  <a class="admin-nav-tile" href="/admin/faculties" data-nav="/admin/faculties">
    <span class="admin-nav-bar config-nav-bar-faculties"></span>
    <span class="admin-nav-label">Faculties</span>
  </a>
  <a class="admin-nav-tile" href="/admin/departments" data-nav="/admin/departments">
    <span class="admin-nav-bar config-nav-bar-departments"></span>
    <span class="admin-nav-label">Departments</span>
  </a>
  <a class="admin-nav-tile" href="/admin/infrastructure/locations" data-nav="/admin/infrastructure/locations">
    <span class="admin-nav-bar config-nav-bar-locations"></span>
    <span class="admin-nav-label">Delivery Locations</span>
  </a>
  <a class="admin-nav-tile" href="/admin/infrastructure/buildings" data-nav="/admin/infrastructure/buildings">
    <span class="admin-nav-bar config-nav-bar-buildings"></span>
    <span class="admin-nav-label">Buildings</span>
  </a>
  <a class="admin-nav-tile" href="/admin/infrastructure/rooms" data-nav="/admin/infrastructure/rooms">
    <span class="admin-nav-bar config-nav-bar-rooms"></span>
    <span class="admin-nav-label">Rooms</span>
  </a>
  <a class="admin-nav-tile" href="/system/lms" data-nav="/system/lms">
    <span class="admin-nav-bar config-nav-bar-lms"></span>
    <span class="admin-nav-label">LMS Config</span>
  </a>
</div>
<script>
(function(){
  const p = location.pathname;
  document.querySelectorAll('.admin-nav-tile[data-nav]').forEach(function(a){
    if (p === a.dataset.nav || p.startsWith(a.dataset.nav + '/')) a.classList.add('active');
  });
})();
</script>
{{end}}
