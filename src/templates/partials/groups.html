{{define "groups"}}
{{if not .Groups}}
  <p class="hint">No groups found for this program.</p>
{{else}}
  <label for="group-select">Group</label>
  <select id="group-select"
    name="group_code"
    hx-get="/classes"
    hx-trigger="change"
    hx-target="#classes-panel"
    hx-include="#period-select, #program-select, this">
    <option value="">— select group —</option>
    {{range .Groups}}
    <option value="{{.GroupCode}}">{{.GroupCode}}</option>
    {{end}}
  </select>
{{end}}
<div id="classes-panel" hx-swap-oob="true">
  <p class="hint">Select a group to see its classes.</p>
</div>
<div id="attendance-panel" hx-swap-oob="true">
  <p class="hint">Check one or more classes above to view attendance.</p>
</div>
{{end}}
