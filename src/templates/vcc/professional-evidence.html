{{define "vcc-professional-evidence"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NVIMS — Professional Evidence</title>
  <link rel="stylesheet" href="/static/base.css">
  <link rel="stylesheet" href="/static/menu.css">
  <link rel="stylesheet" href="/static/sidebar.css">
  <script>document.documentElement.dataset.sidebar=localStorage.getItem("nvims-sidebar")||"open";</script>
</head>
<body>
  {{template "sidebar" .}}
  <div class="page-wrap">
  <header>
    <div class="header-top">
      <div class="header-title-group">
        <a class="header-home" href="/vcc">VCC</a>
        <h1>Professional Evidence</h1>
      </div>
      <form method="POST" action="/logout"><button class="btn-signout">Sign Out</button></form>
    </div>
    <div class="header-sub">
      <span class="header-fullname">{{.User.FullName}}</span>
      <span class="header-role">{{.User.Role}}</span>
    </div>
  </header>
  <main>
    <div class="menu-grid">

      <a class="menu-card" href="/vcc/detail#teaching-quals">
        <div class="menu-card-accent menu-accent-blue"></div>
        <div class="menu-card-body">
          <div class="menu-card-title">Teaching Qualifications</div>
          <div class="menu-card-desc">VET Training &amp; Assessment Qualifications</div>
        </div>
      </a>

      <a href="/vcc/vet-knowledge-currency" class="menu-card">
        <div class="menu-card-accent menu-accent-amber"></div>
        <div class="menu-card-body">
          <div class="menu-card-title">VET Knowledge Currency</div>
          <div class="menu-card-desc">Professional Development</div>
        </div>
      </a>

    </div>
  </main>
  </div>
</body>
</html>{{end}}
